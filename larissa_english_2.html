<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English with Larissa ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf5ef;
    --cream-deep: #f6e3dc;
    --ink: #2e1f24;
    --ink-soft: #6b4955;
    --terracotta: #c4527a;
    --terracotta-deep: #9a3a5d;
    --forest: #5a8a6e;
    --forest-soft: #7aa28a;
    --gold: #d4a574;
    --gold-deep: #b08a5e;
    --rose: #e08aa3;
    --bone: #ecd6cf;
    --shadow: rgba(80, 40, 55, 0.12);
    --shadow-lg: rgba(80, 40, 55, 0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-feature-settings: 'ss01', 'ss02';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  .display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .body-font { font-family: 'Manrope', sans-serif; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(45, 90, 61, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(45, 90, 61, 0); }
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(8px, -8px) rotate(2deg); }
  }

  .fade-up { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .fade-in { animation: fadeIn 0.6s ease both; }
  .scale-in { animation: scaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .shake { animation: shake 0.4s; }
  .pulse-glow { animation: pulse-glow 2s infinite; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--bone); border-radius: 8px; border: 2px solid var(--cream); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  .grain { position: relative; }
  .grain::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }

  .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  @media (max-width: 640px) { .container { padding: 0 16px; } }

  /* ===== WELCOME ===== */
  .welcome {
    min-height: 100vh;
    background: linear-gradient(135deg, #fbf6ec 0%, #f4ead7 60%, #ede1ca 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 40px 0;
  }
  .welcome-blob1 {
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(196, 82, 122, 0.18) 0%, transparent 70%);
    border-radius: 50%;
    animation: drift 12s ease-in-out infinite;
  }
  .welcome-blob2 {
    position: absolute;
    bottom: -120px; left: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(212, 165, 116, 0.18) 0%, transparent 70%);
    border-radius: 50%;
    animation: drift 15s ease-in-out infinite reverse;
  }
  .welcome-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 60px;
    align-items: center;
    position: relative;
    z-index: 2;
  }
  .welcome-tag {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .welcome-tag-line {
    width: 36px; height: 1px;
    background: var(--terracotta);
  }
  .welcome-tag-text {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 600;
  }
  .welcome-h1 {
    font-size: clamp(48px, 8vw, 88px);
    font-weight: 400;
    line-height: 0.95;
    margin: 0 0 12px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .welcome-h1 em {
    font-style: italic;
    color: var(--terracotta);
    font-weight: 500;
  }
  .welcome-tagline {
    font-size: 22px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-soft);
    margin: 0 0 28px;
    line-height: 1.4;
    max-width: 460px;
  }
  .welcome-desc {
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0 0 40px;
    max-width: 460px;
  }
  .welcome-desc strong { color: var(--ink); }
  .btn-primary {
    background: var(--ink);
    color: var(--cream);
    padding: 18px 36px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.3s;
    box-shadow: 0 6px 0 var(--terracotta), 0 12px 24px var(--shadow);
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 var(--terracotta), 0 18px 32px var(--shadow);
  }
  .welcome-stats {
    margin-top: 40px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat-num {
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-num.terra { color: var(--terracotta); }
  .stat-num.forest { color: var(--forest); }
  .stat-num.gold { color: var(--gold-deep); }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .photo-collage {
    position: relative;
    min-height: 480px;
  }
  .polaroid {
    background: var(--cream);
    padding: 12px;
    box-shadow: 0 20px 60px var(--shadow-lg);
    transition: transform 0.4s;
  }
  .polaroid img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .polaroid-caption {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 10px;
    text-align: center;
  }
  .polaroid-larissa {
    position: absolute;
    top: 0; left: 10%;
    width: 70%;
    aspect-ratio: 3/4;
    transform: rotate(-3deg);
    z-index: 2;
  }
  .polaroid-larissa:hover { transform: rotate(0deg) scale(1.02); }
  .polaroid-helena {
    position: absolute;
    top: 60%; right: 0;
    width: 45%;
    aspect-ratio: 3/4;
    transform: rotate(6deg);
    z-index: 3;
    padding: 10px;
    box-shadow: 0 16px 40px var(--shadow-lg);
  }
  .polaroid-helena:hover { transform: rotate(0deg) scale(1.03); }
  .polaroid-helena .polaroid-caption { font-size: 12px; margin-top: 8px; }

  /* ===== HOME ===== */
  .home-header {
    background: var(--ink);
    color: var(--cream);
    padding: 32px 0 80px;
    position: relative;
    overflow: hidden;
  }
  .home-header::before {
    content: '';
    position: absolute; top: 0; right: 0; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(196, 82, 122, 0.28) 0%, transparent 70%);
  }
  .home-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    position: relative;
  }
  .home-header-tag {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 8px;
  }
  .home-header-h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 400;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .home-header-h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .btn-reset {
    color: var(--cream);
    opacity: 0.6;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid rgba(251, 246, 236, 0.3);
    border-radius: 2px;
    transition: opacity 0.3s;
  }
  .btn-reset:hover { opacity: 1; }
  .stats-card {
    margin-top: -50px;
    position: relative;
    z-index: 2;
    background: var(--cream-deep);
    padding: 28px 32px;
    border: 1px solid var(--bone);
    box-shadow: 0 12px 32px var(--shadow);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: center;
  }
  @media (max-width: 540px) {
    .stats-card { grid-template-columns: auto 1fr; }
    .stats-card .stats-points { display: none; }
  }
  .stats-progress-text {
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    color: var(--ink);
  }
  .stats-progress-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .lessons-section { margin-top: 60px; }
  .lessons-heading {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }
  .lessons-heading h2 {
    font-size: 32px;
    font-weight: 500;
    margin: 0;
    color: var(--ink);
  }
  .lessons-heading h2 em {
    font-style: italic;
    color: var(--terracotta);
  }
  .lessons-heading-line {
    flex: 1;
    height: 1px;
    background: var(--bone);
  }
  .lessons-heading-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .lessons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .lesson-card {
    text-align: left;
    background: var(--cream);
    border: 1px solid var(--bone);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    min-height: 220px;
    width: 100%;
  }
  .lesson-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 30px var(--shadow);
  }
  .lesson-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .lesson-num {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    transition: all 0.3s;
  }
  .lesson-icon {
    font-size: 28px;
    opacity: 0.5;
  }
  .lesson-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .lesson-title {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .lesson-title-pt {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .lesson-desc {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin: 0 0 auto;
    flex: 1;
  }
  .lesson-progress-bar-wrap {
    margin-top: 16px;
  }
  .lesson-progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .lesson-progress-row span {
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .lesson-progress-bar-bg {
    height: 3px;
    background: var(--bone);
    border-radius: 2px;
    overflow: hidden;
  }
  .lesson-progress-bar-fill {
    height: 100%;
    transition: width 0.6s;
  }

  .home-footer {
    margin-top: 80px;
    margin-bottom: 80px;
    padding: 40px;
    background: var(--cream-deep);
    border: 1px solid var(--bone);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: center;
  }
  @media (max-width: 540px) {
    .home-footer { grid-template-columns: 1fr; text-align: center; padding: 28px; }
  }
  .home-footer-photo {
    width: 100px; height: 100px;
    flex-shrink: 0;
    background: var(--cream);
    padding: 6px;
    box-shadow: 0 8px 20px var(--shadow);
    transform: rotate(-4deg);
  }
  @media (max-width: 540px) {
    .home-footer-photo { margin: 0 auto; }
  }
  .home-footer-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .home-footer-quote {
    font-size: 22px;
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    margin: 0 0 8px;
    line-height: 1.4;
  }
  .home-footer-attr {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    letter-spacing: 0.05em;
  }

  /* ===== LESSON ===== */
  .lesson-header {
    color: var(--cream);
    padding: 24px 0 64px;
    position: relative;
    overflow: hidden;
  }
  .lesson-header::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.15;
    background: radial-gradient(circle at 80% 20%, var(--cream) 0%, transparent 50%);
  }
  .lesson-header-content {
    position: relative;
  }
  .btn-back {
    color: var(--cream);
    opacity: 0.85;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn-back:hover { opacity: 1; }
  .lesson-h-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  .lesson-h-num {
    font-size: 80px;
    font-weight: 300;
    line-height: 1;
    font-style: italic;
    opacity: 0.9;
  }
  .lesson-h-tag {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .lesson-h-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .lesson-h-title-pt {
    font-size: 18px;
    font-style: italic;
    opacity: 0.85;
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    background: var(--ink);
    padding: 6px;
    gap: 4px;
    max-width: 480px;
    box-shadow: 0 12px 30px var(--shadow);
    margin-top: -28px;
    position: relative;
    z-index: 2;
  }
  .tab {
    flex: 1;
    padding: 12px 16px;
    color: var(--cream);
    background: transparent;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .tab.active {
    color: var(--ink);
    background: var(--cream);
  }

  .lesson-content {
    margin-top: 40px;
    padding-bottom: 80px;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ===== THEORY ===== */
  .theory-intro {
    background: var(--cream-deep);
    padding: 28px 32px;
    margin-bottom: 40px;
    border-left: 4px solid;
  }
  .theory-intro-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .theory-intro-text {
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin: 0;
    line-height: 1.4;
  }
  .theory-section { margin-bottom: 40px; }
  .theory-section-h {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .theory-section-num {
    font-size: 24px;
    font-weight: 500;
    font-style: italic;
  }
  .theory-section-title {
    font-size: 22px;
    font-weight: 500;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .theory-table {
    display: grid;
    gap: 1px;
    background: var(--bone);
    border: 1px solid var(--bone);
  }
  .theory-row {
    background: var(--cream);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: minmax(140px, 1fr) auto 1fr;
    gap: 20px;
    align-items: center;
  }
  @media (max-width: 540px) {
    .theory-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .theory-row-divider { display: none; }
  }
  .theory-row-en {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
  }
  .theory-row-tag {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--cream);
    padding: 2px 6px;
    margin-right: 8px;
    vertical-align: middle;
    border-radius: 2px;
  }
  .theory-row-divider {
    width: 1px;
    height: 16px;
    background: var(--bone);
  }
  .theory-row-pt {
    font-size: 14px;
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
  }
  .theory-cta {
    margin-top: 48px;
    padding: 24px 28px;
    background: var(--ink);
    color: var(--cream);
    text-align: center;
  }
  .theory-cta-text {
    font-size: 16px;
    font-style: italic;
    margin: 0 0 16px;
    opacity: 0.9;
  }
  .theory-cta-sub {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ===== EXAMPLES ===== */
  .examples-head {
    text-align: center;
    margin-bottom: 40px;
  }
  .examples-head-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .examples-head-h2 {
    font-size: 32px;
    font-weight: 500;
    margin: 0;
    color: var(--ink);
    font-style: italic;
  }
  .examples-head-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 12px;
  }
  .examples-list {
    display: grid;
    gap: 16px;
  }
  .example-card {
    background: var(--cream);
    border: 1px solid var(--bone);
    padding: 24px 28px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: center;
    transition: all 0.3s;
  }
  .example-card:hover {
    transform: translateX(4px);
  }
  .example-emoji {
    font-size: 36px;
    line-height: 1;
    width: 56px; height: 56px;
    background: var(--cream-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .example-en {
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .example-pt {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--ink-soft);
  }

  /* ===== EXERCISES ===== */
  .exercise-progress {
    margin-bottom: 32px;
  }
  .exercise-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .exercise-progress-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .exercise-progress-pct {
    font-size: 11px;
    color: var(--ink-soft);
  }
  .exercise-progress-bar {
    height: 4px;
    background: var(--bone);
    border-radius: 2px;
    overflow: hidden;
  }
  .exercise-progress-fill {
    height: 100%;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .exercise-card {
    background: var(--cream);
    border: 1px solid var(--bone);
    padding: clamp(28px, 5vw, 48px);
    box-shadow: 0 12px 32px var(--shadow);
  }
  .exercise-type-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .exercise-q {
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 32px;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .options-list {
    display: grid;
    gap: 10px;
  }
  .option-btn {
    text-align: left;
    padding: 16px 20px;
    background: var(--cream);
    border: 2px solid var(--bone);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--cream-deep);
  }
  .option-btn.selected {
    background: var(--cream-deep);
  }
  .option-btn.correct {
    background: rgba(45, 90, 61, 0.1);
    border-color: var(--forest);
  }
  .option-btn.wrong {
    background: rgba(196, 82, 122, 0.1);
    border-color: var(--terracotta);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    width: 28px; height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bone);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    border-radius: 50%;
    flex-shrink: 0;
    font-family: 'Fraunces', serif;
    transition: all 0.25s;
  }
  .option-btn.selected .option-letter {
    color: var(--cream);
  }
  .option-btn.correct .option-letter {
    background: var(--forest);
    color: var(--cream);
  }
  .option-btn.wrong .option-letter {
    background: var(--terracotta);
    color: var(--cream);
  }
  .option-text { flex: 1; }

  .fill-input {
    width: 100%;
    padding: 20px 24px;
    font-size: 22px;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    color: var(--ink);
    background: var(--cream-deep);
    border: 2px solid var(--bone);
    outline: none;
    transition: all 0.3s;
  }
  .fill-input.correct {
    background: rgba(45, 90, 61, 0.08);
    border-color: var(--forest);
  }
  .fill-input.wrong {
    background: rgba(196, 82, 122, 0.08);
    border-color: var(--terracotta);
  }
  .fill-correct-answer {
    margin-top: 16px;
    padding: 16px;
    background: var(--cream-deep);
    border-left: 3px solid var(--terracotta);
  }
  .fill-correct-tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .fill-correct-text {
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    font-family: 'Fraunces', serif;
  }

  .feedback {
    margin-top: 28px;
    padding: 20px;
    border-left: 4px solid;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .feedback.correct {
    background: rgba(45, 90, 61, 0.08);
    border-color: var(--forest);
  }
  .feedback.wrong {
    background: var(--cream-deep);
    border-color: var(--terracotta);
  }
  .feedback-icon {
    font-size: 24px;
    line-height: 1;
    margin-top: 2px;
  }
  .feedback.correct .feedback-icon { color: var(--forest); }
  .feedback.wrong .feedback-icon { color: var(--terracotta); }
  .feedback-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }
  .feedback.correct .feedback-title { color: var(--forest); }
  .feedback.wrong .feedback-title { color: var(--terracotta); }
  .feedback-hint {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .exercise-actions {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn-hint {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    padding: 10px 16px;
    border: 1px solid var(--bone);
    transition: all 0.2s;
  }
  .btn-hint:hover:not(:disabled) {
    border-color: var(--gold);
  }
  .btn-hint:disabled { opacity: 0.4; cursor: default; }
  .btn-check {
    background: var(--ink);
    color: var(--cream);
    padding: 14px 32px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .btn-check:hover:not(:disabled) {
    transform: translateY(-2px);
  }
  .btn-check:disabled { opacity: 0.4; cursor: default; }
  .btn-next {
    background: var(--ink);
    color: var(--cream);
    padding: 14px 32px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .btn-next.correct-style { background: var(--forest); }
  .btn-next:hover { transform: translateY(-2px); }

  .hint-inline {
    margin-top: 20px;
    padding: 16px;
    background: rgba(212, 165, 116, 0.15);
    border-left: 3px solid var(--gold);
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* ===== COMPLETED ===== */
  .completed {
    max-width: 600px;
    margin: 40px auto 0;
  }
  .completed-card {
    background: var(--cream);
    border: 1px solid var(--bone);
    padding: clamp(32px, 6vw, 56px);
    text-align: center;
    box-shadow: 0 16px 40px var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .completed-pct {
    font-size: 72px;
    font-weight: 300;
    font-style: italic;
    line-height: 1;
    margin-bottom: 8px;
    position: relative;
  }
  .completed-tag {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 24px;
  }
  .completed-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }
  .completed-stats-num {
    font-size: 38px;
    font-weight: 500;
    line-height: 1;
  }
  .completed-stats-num.green { color: var(--forest); }
  .completed-stats-num.ink { color: var(--ink); }
  .completed-stats-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .completed-divider {
    width: 1px;
    background: var(--bone);
  }
  .completed-msg {
    font-size: 24px;
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    margin: 0 0 32px;
  }
  .completed-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-restart {
    padding: 14px 28px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--cream-deep);
    border: 1px solid var(--bone);
    transition: all 0.3s;
  }
  .btn-restart:hover { background: var(--cream); }

  /* Loading */
  .loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
  }
  .loading-text {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-style: italic;
    color: var(--ink-soft);
  }
</style>
</head>

// ============================================================================
// STATE & STORAGE
// ============================================================================
const STORAGE_KEY = 'larissa-english-progress';
let state = {
  view: 'welcome', // welcome | home | lesson
  lessonId: null,
  tab: 'theory', // theory | examples | exercises
  exerciseIdx: 0,
  userAnswer: null,
  feedback: null, // { correct: bool }
  showHint: false,
  score: 0,
  completed: false,
  shake: false,
  progress: {},
  loaded: false,
};

async function loadProgress() {
  try {
    if (window.storage) {
      const result = await window.storage.get(STORAGE_KEY);
      return result ? JSON.parse(result.value) : {};
    }
  } catch (e) { /* falls through */ }
  // localStorage fallback for opening as a regular .html file
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? JSON.parse(v) : {};
  } catch (e) {
    return {};
  }
}

async function saveProgress(progress) {
  try {
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, JSON.stringify(progress));
      return;
    }
  } catch (e) { /* falls through */ }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) {
    console.warn('Could not save progress', e);
  }
}

// ============================================================================
// UTILS
// ============================================================================
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getLesson(id) {
  return LESSONS.find(l => l.id === id);
}

function progressRingSVG(value, size = 70, strokeWidth = 6, color = 'var(--terracotta)') {
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (value / 100) * circumference;
  return `
    <svg width="${size}" height="${size}" style="transform: rotate(-90deg);">
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="var(--bone)" stroke-width="${strokeWidth}" />
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${strokeWidth}"
        stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transition: stroke-dashoffset 0.6s cubic-bezier(0.22, 1, 0.36, 1);" />
    </svg>
  `;
}

  let bodyHtml;
  if (state.tab === 'theory') bodyHtml = renderTheory(lesson);
  else if (state.tab === 'examples') bodyHtml = renderExamples(lesson);
  else if (state.tab === 'exercises') {
    bodyHtml = state.completed ? renderCompleted(lesson) : renderExercise(lesson);
  }

  return `
    <div style="min-height: 100vh; background: var(--cream);">
      <header class="lesson-header" style="background: ${accent};">

function renderExercise(lesson) {
  const ex = lesson.exercises[state.exerciseIdx];
  const total = lesson.exercises.length;
  const accent = lesson.accent;
  const fb = state.feedback;
  const pct = ((state.exerciseIdx + (fb ? 1 : 0)) / total) * 100;
  const isLast = state.exerciseIdx === total - 1;

  let inputHtml = '';
  if (ex.type === 'mc') {
    inputHtml = `
      <div class="options-list">
        ${ex.options.map((opt, i) => {
          const isSelected = state.userAnswer === i;
          const isCorrectOpt = fb && i === ex.answer;
          const isWrongOpt = fb && isSelected && !fb.correct;
          let cls = 'option-btn';
          let style = '';
          if (isCorrectOpt) cls += ' correct';
          else if (isWrongOpt) cls += ' wrong';
          else if (isSelected) {
            cls += ' selected';
            style = `border-color: ${accent};`;
          }
          let letter = String.fromCharCode(65 + i);
          if (fb && isCorrectOpt) letter = '✓';
          else if (fb && isWrongOpt) letter = '✕';
          let letterStyle = '';
          if (isSelected && !fb) letterStyle = `background: ${accent}; color: var(--cream);`;
          return `
            <button class="${cls}" style="${style}" ${fb ? 'disabled' : ''} onclick="actions.selectOption(${i})">
              <span class="option-letter" style="${letterStyle}">${letter}</span>
              <span class="option-text">${escapeHtml(opt)}</span>
            </button>
          `;
        }).join('')}
      </div>
    `;
  } else if (ex.type === 'fill') {
    let inputCls = 'fill-input';
    if (fb?.correct) inputCls += ' correct';
    else if (fb) inputCls += ' wrong';
    inputHtml = `
      <input type="text" class="${inputCls}" id="fillInput" value="${escapeHtml(state.userAnswer || '')}"
        ${fb ? 'disabled' : ''} placeholder="Digite sua resposta..." autocomplete="off" spellcheck="false"
        oninput="actions.updateAnswer(this.value)" onkeydown="actions.handleKey(event)" />
      ${fb && !fb.correct ? `
        <div class="fill-correct-answer">
          <div class="fill-correct-tag">Resposta correta:</div>
          <div class="display fill-correct-text">"${escapeHtml(ex.answer || '(deixe em branco)')}"</div>
        </div>
      ` : ''}
    `;
  }

  let feedbackHtml = '';
  if (fb) {
    feedbackHtml = `
      <div class="feedback ${fb.correct ? 'correct' : 'wrong'} scale-in">
        <div class="feedback-icon">${fb.correct ? '✦' : '◐'}</div>
        <div style="flex: 1;">
          <div class="feedback-title">${fb.correct ? 'Perfect, my love!' : 'Quase! Tenta de novo na cabeça...'}</div>
          ${ex.hint ? `<div class="feedback-hint">💡 ${escapeHtml(ex.hint)}</div>` : ''}
        </div>
      </div>
    `;
  }

  let canCheck = false;
  if (ex.type === 'mc') canCheck = state.userAnswer !== null;
  else if (ex.type === 'fill') {
    canCheck = (state.userAnswer && state.userAnswer.trim() !== '') || ex.answer === '';
  }

  let actionsHtml;
  if (!fb) {
    actionsHtml = `
      <button class="btn-check" style="box-shadow: 0 4px 0 ${accent}; ${!canCheck ? 'opacity: 0.4;' : ''}"
        ${!canCheck ? 'disabled' : ''} onclick="actions.check()">Verificar →</button>
    `;
  } else {
    const bg = fb.correct ? 'var(--forest)' : 'var(--ink)';
    const shadow = fb.correct ? '#1f4029' : accent;
    actionsHtml = `
      <button class="btn-next ${fb.correct ? 'correct-style' : ''} pulse-glow"
        style="box-shadow: 0 4px 0 ${shadow};" onclick="actions.next()">
        ${isLast ? 'Finalizar →' : 'Próxima →'}
      </button>
    `;
  }

  return `
    <div class="fade-up">
      <div class="exercise-progress">
        <div class="exercise-progress-row">
          <div class="exercise-progress-label">Exercício ${state.exerciseIdx + 1} de ${total}</div>
          <div class="exercise-progress-pct">${Math.round(pct)}%</div>
        </div>
        <div class="exercise-progress-bar">
          <div class="exercise-progress-fill" style="width: ${pct}%; background: ${accent};"></div>
        </div>
      </div>
      <div class="exercise-card ${state.shake ? 'shake' : ''}">
        <div class="exercise-type-tag" style="color: ${accent};">
          ${ex.type === 'mc' ? '◆ Múltipla escolha' : '◆ Complete'}
        </div>
        <h3 class="display exercise-q">${escapeHtml(ex.q)}</h3>
        ${inputHtml}
        ${feedbackHtml}
        <div class="exercise-actions">
          <button class="btn-hint" ${fb ? 'disabled' : ''} onclick="actions.toggleHint()">
            💡 ${state.showHint ? 'Esconder dica' : 'Ver dica'}
          </button>
          ${actionsHtml}
        </div>
        ${state.showHint && !fb && ex.hint ? `<div class="hint-inline fade-in">💡 ${escapeHtml(ex.hint)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderCompleted(lesson) {
  const total = lesson.exercises.length;
  const pct = Math.round((state.score / total) * 100);
  const accent = lesson.accent;
  let message;
  if (pct === 100) message = 'Perfeição! Você arrasou! 🌟';
  else if (pct >= 75) message = 'Excelente trabalho!';
  else if (pct >= 50) message = 'Muito bem! Mas vamos revisar.';
  else message = 'Continua estudando, você consegue!';

  return `
    <div class="completed scale-in">
      <div class="completed-card">
        <div style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px;
          background: radial-gradient(circle, ${accent}33 0%, transparent 70%);"></div>
        <div class="display completed-pct" style="color: ${accent};">${pct}%</div>
        <div class="completed-tag">Lição completa · ${escapeHtml(lesson.title)}</div>
        <div class="completed-stats">
          <div>
            <div class="display completed-stats-num green">${state.score}</div>
            <div class="completed-stats-label">Acertos</div>
          </div>
          <div class="completed-divider"></div>
          <div>
            <div class="display completed-stats-num ink">${total}</div>
            <div class="completed-stats-label">Total</div>
          </div>
        </div>
        <p class="display completed-msg">${message}</p>
        <div class="completed-actions">
          <button class="btn-restart" onclick="actions.restartExercises()">↻ Refazer</button>
          <button class="btn-next" style="box-shadow: 0 4px 0 ${accent};" onclick="actions.backToHome()">Próxima lição →</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================================
// RENDER & ACTIONS
// ============================================================================
function render() {
  const app = document.getElementById('app');
  if (!state.loaded) {
    app.innerHTML = `<div class="loading"><div class="loading-text">Carregando seu progresso...</div></div>`;
    return;
  }
  let html;
  if (state.view === 'welcome') html = renderWelcome();
  else if (state.view === 'home') html = renderHome();
  else if (state.view === 'lesson') html = renderLesson();
  app.innerHTML = html;

  // Auto-focus the fill input
  if (state.view === 'lesson' && state.tab === 'exercises' && !state.completed) {
    const lesson = getLesson(state.lessonId);
    const ex = lesson?.exercises[state.exerciseIdx];
    if (ex?.type === 'fill' && !state.feedback) {
      const input = document.getElementById('fillInput');
      if (input) {
        input.focus();
        const v = input.value;
        input.value = '';
        input.value = v;
      }
    }
  }
}

const actions = {
  start: () => {
    state.view = 'home';
    window.scrollTo(0, 0);
    render();
  },
  openLesson: (id) => {
    state.view = 'lesson';
    state.lessonId = id;
    state.tab = 'theory';
    state.exerciseIdx = 0;
    state.userAnswer = null;
    state.feedback = null;
    state.showHint = false;
    state.score = 0;
    state.completed = false;
    window.scrollTo(0, 0);
    render();
  },
  backToHome: () => {
    state.view = 'home';
    state.lessonId = null;
    window.scrollTo(0, 0);
    render();
  },
  setTab: (t) => {
    state.tab = t;
    if (t === 'exercises') {
      // Reset exercise state when entering
      if (!state.completed) {
        // Keep current state if already in progress, otherwise reset
      }
    }
    render();
  },
  selectOption: (i) => {
    if (state.feedback) return;
    state.userAnswer = i;
    render();
  },
  updateAnswer: (val) => {
    state.userAnswer = val;
    // Don't re-render to keep cursor position in input
  },
  handleKey: (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (state.feedback) actions.next();
      else actions.check();
    }
  },
  toggleHint: () => {
    state.showHint = !state.showHint;
    render();
  },
  check: () => {
    const lesson = getLesson(state.lessonId);
    const ex = lesson.exercises[state.exerciseIdx];
    let correct = false;
    if (ex.type === 'mc') {
      correct = state.userAnswer === ex.answer;
    } else if (ex.type === 'fill') {
      const norm = (s) => String(s || '').toLowerCase().trim().replace(/[.,!?;]/g, '');
      const ans = norm(state.userAnswer);
      const target = norm(ex.answer);
      correct = ans === target;
      if (!correct && ex.alt) {
        correct = ex.alt.some(a => norm(a) === ans);
      }
      if (!correct && ex.answer === '' && (ans === '' || ans === 'nada' || ans === 'none' || ans === '-')) {
        correct = true;
      }
    }
    if (correct) {
      state.score += 1;
      state.feedback = { correct: true };
    } else {
      state.feedback = { correct: false };
      state.shake = true;
      setTimeout(() => { state.shake = false; render(); }, 400);
    }
    render();
  },
  next: async () => {
    const lesson = getLesson(state.lessonId);
    const isLast = state.exerciseIdx === lesson.exercises.length - 1;
    if (isLast) {
      state.completed = true;
      // Save progress
      const newProgress = {
        ...state.progress,
        [lesson.id]: {
          completed: true,
          score: Math.max(state.score, state.progress[lesson.id]?.score || 0),
          attempts: (state.progress[lesson.id]?.attempts || 0) + 1,
          completedAt: new Date().toISOString(),
        },
      };
      state.progress = newProgress;
      await saveProgress(newProgress);
      render();
    } else {
      state.exerciseIdx += 1;
      state.userAnswer = null;
      state.feedback = null;
      state.showHint = false;
      render();
    }
  },
  restartExercises: () => {
    state.exerciseIdx = 0;
    state.userAnswer = null;
    state.feedback = null;
    state.showHint = false;
    state.score = 0;
    state.completed = false;
    render();
  },
  reset: async () => {
    if (confirm('Tem certeza que quer resetar todo o progresso?')) {
      state.progress = {};
      await saveProgress({});
      state.view = 'welcome';
      render();
    }
  },
};

// expose for inline onclick handlers
window.actions = actions;

// ============================================================================
// BOOT
// ============================================================================
(async function init() {
  render(); // show loading
  state.progress = await loadProgress();
  state.loaded = true;
  // Skip welcome if returning user
  if (Object.keys(state.progress).length > 0) {
    state.view = 'home';
  }
  render();
})();
</script>
